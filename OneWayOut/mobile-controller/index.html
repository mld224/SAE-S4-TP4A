<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Way Out - Controller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>One Way Out</h1>

    <div id="status">Déconnecté</div>

    <div class="scoreboard">
      <div>A : <span id="voteA">0</span></div>
      <div>B : <span id="voteB">0</span></div>
      <div>C : <span id="voteC">0</span></div>
    </div>

    <div class="buttons">
      <button id="btnA">A</button>
      <button id="btnB">B</button>
      <button id="btnC">C</button>
    </div>

    <button id="resetBtn" class="reset">RESET</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
